{% extends "layout.html" %}
{% block content %}
<div class="space-universe-bg">

    <div class="shooting-stars-background">
        <span></span><span></span><span></span><span></span><span></span><span></span>
    </div>

    <div style="text-align: center; padding-top: 50px; position: relative; z-index: 5;">
        <h2 class="center-gradient-title">CHEMI ORBIT</h2>
        <span class="center-sub">TEAM PROJECTS</span>
    </div>

    <div class="orbit-system-container">
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 20; text-align: center;">
            <button onclick="openAddModal()" style="width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle, #ffd700, #ff8c00); border: none; color: #fff; font-weight: 800; font-size: 14px; cursor: pointer; box-shadow: 0 0 35px #ff8c00; transition: transform 0.2s;">
                PROJECT<br>+
            </button>
        </div>

        {% for proj in projects %}
        <div class="moving-orbit-bubble bubble-color-{{ loop.cycle('1', '2', '3', '4', '5') }}" 
             onclick="openDetailModal('{{ proj.title }}', '{{ proj.summary }}', '{{ proj.id }}')">
            <span>{{ proj.title }}</span>
        </div>
        {% else %}
        <div style="position: absolute; top: 40%; width: 100%; text-align: center; color: rgba(255,255,255,0.5);">
            행성이 아직 생성되지 않았습니다. 메인 태양버튼을 눌러 팀 보고서를 등록해 보세요! 🪐
        </div>
        {% endfor %}
    </div>

</div>

<div id="detailModal" class="project-modal-overlay" onclick="closeDetailModal(event)">
    <div class="project-modal-content">
        <span class="modal-close-btn" onclick="document.getElementById('detailModal').classList.remove('active')">✕</span>
        <span class="modal-header-tag">PLANET EXPLORATION</span>
        <h3 id="modalTitle" class="modal-main-title"></h3>
        <p id="modalSummary" class="modal-body-summary"></p>
        <div id="modalDeleteArea" style="margin-top: 20px; text-align: right;"></div>
    </div>
</div>

<div id="addModal" class="project-modal-overlay" onclick="closeAddModal(event)">
    <div class="project-modal-content" style="max-width: 450px;">
        <span class="modal-close-btn" onclick="document.getElementById('addModal').classList.remove('active')">✕</span>
        <h3 class="modal-main-title" style="color: #ffd700 !important;">🪐 새로운 팀 프로젝트 행성 생성</h3>
        <form action="/addProject" method="POST" style="display: flex; flex-direction: column; gap: 12px; margin-top: 15px;">
            <input type="text" name="title" placeholder="프로젝트/팀 이름" required style="background: rgba(0,0,0,0.5); border: 1px solid #444; padding: 12px; border-radius: 10px; color: white; font-size: 14px; outline: none;">
            <textarea name="summary" placeholder="프로젝트 주요 탐구 내용 및 탐구보고서를 자유롭게 작성해 주세요..." required rows="6" style="background: rgba(0,0,0,0.5); border: 1px solid #444; padding: 12px; border-radius: 10px; color: white; font-size: 14px; outline: none; resize: none;"></textarea>
            <button type="submit" style="background: linear-gradient(90deg, #ff8c00, #ffd700); border: none; padding: 12px; border-radius: 10px; color: white; font-weight: 700; cursor: pointer; margin-top: 5px;">나만의 행성 만들기 🚀</button>
        </form>
    </div>
</div>

<script>
function openDetailModal(title, summary, id) {
    document.getElementById('modalTitle').innerText = title;
    document.getElementById('modalSummary').innerText = summary;
    
    const deleteArea = document.getElementById('modalDeleteArea');
    {% if session.get('is_admin') %}
    deleteArea.innerHTML = `<a href="/deleteProject/${id}" class="proj-delete-btn" onclick="return confirm('이 행성을 삭제하시겠습니까?');">행성 삭제</a>`;
    {% else %}
    deleteArea.innerHTML = '';
    {% endif %}
    
    document.getElementById('detailModal').classList.add('active');
}
function closeDetailModal(e) {
    if(e.target.classList.contains('project-modal-overlay')) {
        document.getElementById('detailModal').classList.remove('active');
    }
}

function openAddModal() {
    document.getElementById('addModal').classList.add('active');
}
function closeAddModal(e) {
    if(e.target.classList.contains('project-modal-overlay')) {
        document.getElementById('addModal').classList.remove('active');
    }
}
</script>
{% endblock %}
