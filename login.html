{% extends "layout.html" %}
{% block content %}
<div style="max-width: 400px; margin: 80px auto; padding: 30px; background: #fff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); text-align: center; border: 1px solid #eae7dc;">
    <h2 style="font-weight: 800; color: #333; margin-bottom: 10px;">🔐 관리자 로그인</h2>
    <p style="color: #888; font-size: 14px; margin-bottom: 25px;">동아리 관리자 권한을 인증합니다.</p>
    
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div style="background: #ffe3e3; color: #dc3545; padding: 10px; border-radius: 10px; font-size: 13px; margin-bottom: 15px; font-weight: 600;">
          {{ messages[0] }}
        </div>
      {% endif %}
    {% endwith %}

    <form action="/login" method="POST">
        <input type="password" name="password" placeholder="관리자 비밀번호 입력" required
               style="width: 100%; height: 46px; padding: 0 15px; border: 1px solid #e1ded3; border-radius: 12px; font-size: 15px; box-sizing: border-box; outline: none; margin-bottom: 15px; text-align: center; background: #faf9f5;">
        <button type="submit" 
                style="width: 100%; height: 46px; background: #ffec99; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; color: #5c532e; cursor: pointer; transition: background 0.2s;">
            로그인하기
        </button>
    </form>
</div>
{% endblock %}
